# ══════════════════════════════════════════════════════════════
# BlackStone Order SCM — Docker Compose
# 3 Containers: App + DB + Cron
# ══════════════════════════════════════════════════════════════
# 
# CÁCH SỬ DỤNG:
#   1. Copy .env.production.example → .env.production, điền giá trị
#   2. docker compose up -d --build
#   3. Truy cập: http://localhost:3000
#
# Lần đầu chạy trên server mới:
#   docker compose up -d
#   docker compose exec app node scripts/init-db.mjs   (nếu cần)
# ══════════════════════════════════════════════════════════════

services:

  # ┌────────────────────────────────────────────────────────────┐
  # │  CONTAINER 1: NEXT.JS APPLICATION                          │
  # │  Web app chính — Next.js 16 standalone                     │
  # │  Chứa: API routes, SSR pages, UI components                │
  # └────────────────────────────────────────────────────────────┘
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: blackstone-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - SYNC_API_KEY=${SYNC_API_KEY}
      - ONEOFFICE_API_KEY=${ONEOFFICE_API_KEY}
      - ONEOFFICE_BASE_URL=${ONEOFFICE_BASE_URL}
      - ONEOFFICE_INVENTORY_TOKEN=${ONEOFFICE_INVENTORY_TOKEN}
      - ONEOFFICE_WAREHOUSE_TOKEN=${ONEOFFICE_WAREHOUSE_TOKEN}
      - CRON_SECRET=${CRON_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - blackstone-net
    labels:
      - "com.blackstone.service=web-app"
      - "com.blackstone.description=Next.js SCM Application"

  # ┌────────────────────────────────────────────────────────────┐
  # │  CONTAINER 2: CRON SCHEDULER                               │
  # │  Chạy cron jobs tự động thay thế Vercel Cron               │
  # │  - Sync 1Office → Supabase (daily)                         │
  # │  - Sync Google Sheets → fact_dam (daily)                   │
  # └────────────────────────────────────────────────────────────┘
  cron:
    build:
      context: ./docker/cron
      dockerfile: Dockerfile
    container_name: blackstone-cron
    restart: unless-stopped
    environment:
      - APP_URL=http://app:3000
      - CRON_SECRET=${CRON_SECRET}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - blackstone-net
    labels:
      - "com.blackstone.service=cron-scheduler"
      - "com.blackstone.description=Scheduled sync jobs (1Office, Google Sheets)"

  # ┌────────────────────────────────────────────────────────────┐
  # │  CONTAINER 3: DATA SEED / MIGRATION RUNNER (run-once)      │
  # │  Chạy các script upload data ban đầu:                      │
  # │  - Import CSV → dim_hom, dim_ncc, dim_kho                  │
  # │  - Sync inventory từ Google Sheets                         │
  # │  - Upload fact_dam                                         │
  # │  Container này chạy 1 lần rồi tự exit.                    │
  # └────────────────────────────────────────────────────────────┘
  seed:
    build:
      context: .
      dockerfile: docker/seed/Dockerfile
    container_name: blackstone-seed
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - APP_URL=http://app:3000
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    networks:
      - blackstone-net
    profiles:
      - seed
    labels:
      - "com.blackstone.service=data-seeder"
      - "com.blackstone.description=One-time data import (CSV, Google Sheets)"

  # ┌────────────────────────────────────────────────────────────┐
  # │  CONTAINER 4: NGINX REVERSE PROXY (optional)               │
  # │  SSL termination + caching + gzip                          │
  # │  Bỏ comment nếu cần chạy trên domain với HTTPS             │
  # └────────────────────────────────────────────────────────────┘
  # nginx:
  #   image: nginx:alpine
  #   container_name: blackstone-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./docker/nginx/certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - blackstone-net

networks:
  blackstone-net:
    driver: bridge
    name: blackstone-network
